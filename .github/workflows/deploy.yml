name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "index.html"
      - "about.html"
      - "favicon.svg"
      - "robots.txt"
      - "sitemap.xml"
      - ".nojekyll"
      - "_astro/**"
      - "images/**"
      - "students/**"
      - "downloads/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish built site to repository root (User Pages from master)
        run: npm run publish:root
      - name: Commit site root for GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .nojekyll index.html about.html favicon.svg robots.txt sitemap.xml _astro images students downloads
          git diff --staged --quiet && echo "No site root changes to commit." && exit 0
          git commit -m "Deploy site to Pages root [skip ci]"
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      # Fallback: publish built site to gh-pages branch (for "Deploy from branch" setting)
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy site from ${{ github.sha }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
